<!DOCTYPE html>
<html>
<head>
    <title>ShopNow</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f2f2f2;
        }

        header {
            background-color: #232f3e;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            border: none;
            cursor: pointer;
        }

        .cart-btn {
            background-color: orange;
        }

        .buy-btn {
            background-color: green;
            color: white;
        }

        #cart {
            background: white;
            padding: 15px;
            margin: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>ShopNow</h1>
</header>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/200" />
        <h3>Product 1</h3>
        <p>$20</p>
        <button class="cart-btn" onclick="addToCart('Product 1',20)">Add to Cart</button>
        <button class="buy-btn">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" />
        <h3>Product 2</h3>
        <p>$35</p>
        <button class="cart-btn" onclick="addToCart('Product 2',35)">Add to Cart</button>
        <button class="buy-btn">Buy Now</button>
    </div>

</div>

<div id="cart">
    <h2>Shopping Cart</h2>
    <ul id="cart-items"></ul>
    <h3 id="total">Total: $0</h3>
</div>

<script>
    let total = 0;

    function addToCart(product, price) {
        let cartItems = document.getElementById("cart-items");
        let li = document.createElement("li");
        li.textContent = product + " - $" + price;
        cartItems.appendChild(li);

        total += price;
        document.getElementById("total").textContent = "Total: $" + total;
    }
</script>

</body>
</html>
